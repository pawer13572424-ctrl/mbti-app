<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MBTI 性格診断</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8fafc;
      --surface: #f1f5f9;
      --card: #ffffff;
      --accent: #7c3aed;
      --accent2: #6d28d9;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    /* --- START PAGE --- */
    #page-start { text-align: center; }
    #page-start h1 {
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent2), #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }
    #page-start p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 36px;
    }
    .badge-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }
    .badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 0.85rem;
      color: var(--accent2);
    }

    /* --- QUIZ PAGE --- */
    #page-quiz { display: none; }
    .progress-wrap {
      margin-bottom: 28px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .progress-bar {
      height: 6px;
      background: var(--surface);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #60a5fa);
      border-radius: 999px;
      transition: width 0.4s ease;
    }
    .question-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 24px;
    }
    .dimension-tag {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent2);
      background: rgba(124,58,237,0.15);
      border-radius: 999px;
      padding: 3px 12px;
      margin-bottom: 16px;
    }
    .question-text {
      font-size: 1.2rem;
      font-weight: 600;
      line-height: 1.6;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .option-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      cursor: pointer;
      font-size: 0.98rem;
      padding: 16px 20px;
      text-align: left;
      transition: border-color 0.2s, background 0.2s, transform 0.1s;
    }
    .option-btn:hover {
      border-color: var(--accent2);
      background: rgba(124,58,237,0.1);
      transform: translateX(4px);
    }
    .option-btn.selected {
      border-color: var(--accent);
      background: rgba(124,58,237,0.2);
    }
    .nav-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 24px;
    }

    /* --- RESULT PAGE --- */
    #page-result { display: none; text-align: center; }
    .type-display {
      margin-bottom: 28px;
    }
    .type-emoji {
      font-size: 5rem;
      line-height: 1;
      margin-bottom: 12px;
      filter: drop-shadow(0 4px 12px rgba(124,58,237,0.2));
    }
    .type-code {
      font-size: 3.2rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, var(--accent2), #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .type-name {
      font-size: 1.3rem;
      color: var(--muted);
      margin-top: 4px;
    }
    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 20px;
      text-align: left;
    }
    .result-card h3 {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent2);
      margin-bottom: 14px;
    }
    .result-card p {
      color: var(--muted);
      line-height: 1.75;
      font-size: 0.97rem;
    }
    .traits {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .trait {
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 0.85rem;
      color: var(--accent2);
    }
    .dim-bars {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .dim-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .dim-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
    }
    .dim-labels .left { color: var(--accent2); }
    .dim-labels .right { color: var(--muted); }
    .dim-bar-bg {
      height: 8px;
      background: var(--surface);
      border-radius: 999px;
      overflow: hidden;
    }
    .dim-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #60a5fa);
      border-radius: 999px;
      transition: width 1s ease;
    }
    .famous {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .famous-person {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.85rem;
      color: var(--text);
    }
    .check-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .check-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .check-list li::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 6px;
      flex-shrink: 0;
    }
    .list-good li::before { background: #34d399; }
    .list-bad li::before { background: #f87171; }
    .list-suited li::before { background: #60a5fa; }
    .list-unsuited li::before { background: #fb923c; }
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .two-col .result-card { margin-bottom: 0; }
    .col-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }
    .col-label.good { color: #34d399; }
    .col-label.bad { color: #f87171; }
    .col-label.suited { color: #60a5fa; }
    .col-label.unsuited { color: #fb923c; }
    .stress-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .stress-tag {
      background: rgba(251,146,60,0.1);
      border: 1px solid rgba(251,146,60,0.3);
      border-radius: 999px;
      padding: 4px 13px;
      font-size: 0.82rem;
      color: #fb923c;
    }
    .rel-box {
      background: rgba(96,165,250,0.07);
      border: 1px solid rgba(96,165,250,0.2);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.7;
    }
    @media (max-width: 520px) {
      .two-col { grid-template-columns: 1fr; }
    }

    /* --- BUTTONS --- */
    .btn {
      background: linear-gradient(135deg, var(--accent), #5b21b6);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      padding: 14px 32px;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-secondary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      cursor: pointer;
      font-size: 0.95rem;
      padding: 13px 24px;
      transition: border-color 0.2s;
    }
    .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      color: var(--accent2);
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 13px 28px;
      transition: background 0.2s;
    }
    .btn-outline:hover { background: rgba(124,58,237,0.1); }
    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="container">

  <!-- START PAGE -->
  <div id="page-start">
    <h1>MBTI 性格診断</h1>
    <p>20の質問に答えるだけで、あなたの性格タイプを診断します。<br>直感的に感じる方を選んでください。</p>
    <div class="badge-row">
      <span class="badge">20問</span>
      <span class="badge">約3分</span>
      <span class="badge">16タイプ</span>
    </div>
    <button class="btn" onclick="startQuiz()">診断をはじめる</button>
  </div>

  <!-- QUIZ PAGE -->
  <div id="page-quiz">
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="q-label">質問 1 / 20</span>
        <span id="q-percent">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="question-card">
      <div class="dimension-tag" id="dim-tag"></div>
      <div class="question-text" id="question-text"></div>
    </div>
    <div class="options" id="options-container"></div>
    <div class="nav-row">
      <button class="btn-secondary" id="btn-prev" onclick="prevQuestion()">戻る</button>
      <button class="btn" id="btn-next" onclick="nextQuestion()" disabled>次へ</button>
    </div>
  </div>

  <!-- RESULT PAGE -->
  <div id="page-result">
    <div class="type-display">
      <div class="type-emoji" id="res-emoji"></div>
      <div class="type-code" id="res-code"></div>
      <div class="type-name" id="res-name"></div>
    </div>
    <div class="result-card">
      <h3>説明</h3>
      <p id="res-desc"></p>
    </div>
    <div class="result-card">
      <h3>主な特徴</h3>
      <div class="traits" id="res-traits"></div>
    </div>
    <div class="result-card">
      <h3>スコア内訳</h3>
      <div class="dim-bars" id="res-bars"></div>
    </div>
    <div class="two-col">
      <div class="result-card">
        <div class="col-label good">長所</div>
        <ul class="check-list list-good" id="res-strengths"></ul>
      </div>
      <div class="result-card">
        <div class="col-label bad">短所</div>
        <ul class="check-list list-bad" id="res-weaknesses"></ul>
      </div>
    </div>
    <div class="two-col" style="margin-top:20px;">
      <div class="result-card">
        <div class="col-label suited">向いている仕事</div>
        <ul class="check-list list-suited" id="res-suited"></ul>
      </div>
      <div class="result-card">
        <div class="col-label unsuited">向いていない仕事</div>
        <ul class="check-list list-unsuited" id="res-unsuited"></ul>
      </div>
    </div>
    <div class="result-card" style="margin-top:20px;">
      <h3>ストレスになりやすいこと</h3>
      <div class="stress-tags" id="res-stress"></div>
    </div>
    <div class="result-card">
      <h3>人間関係のヒント</h3>
      <div class="rel-box" id="res-relationship"></div>
    </div>
    <div class="result-card">
      <h3>同じタイプの有名人</h3>
      <div class="famous" id="res-famous"></div>
    </div>
    <div style="display:flex;gap:12px;justify-content:center;margin-top:28px;flex-wrap:wrap;">
      <button class="btn-outline" onclick="restartQuiz()">もう一度診断する</button>
    </div>
  </div>

</div>

<script>

  { dim: 'T/F', label: '思考 / 感情', text: '意思決定のとき、重視するのは？', a: '論理的な分析と客観的な基準', b: '人への影響や自分・他者の価値観', scoreA: 'T' },

let currentQ = 0;
let answers = new Array(QUESTIONS.length).fill(null);

function startQuiz() {
  document.getElementById('page-start').style.display = 'none';
  document.getElementById('page-quiz').style.display = 'block';
  showQuestion(0);
}

function showQuestion(idx) {
  const q = QUESTIONS[idx];
  currentQ = idx;
  const total = QUESTIONS.length;
  const pct = Math.round((idx / total) * 100);

  document.getElementById('q-label').textContent = `質問 ${idx + 1} / ${total}`;
  document.getElementById('q-percent').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;
  document.getElementById('dim-tag').textContent = q.label;
  document.getElementById('question-text').textContent = q.text;

  const container = document.getElementById('options-container');
  container.innerHTML = '';
  ['a', 'b'].forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (answers[idx] === choice ? ' selected' : '');
    btn.textContent = q[choice];
    btn.onclick = () => selectOption(choice);
    container.appendChild(btn);
  });

  document.getElementById('btn-prev').style.visibility = idx === 0 ? 'hidden' : 'visible';
  document.getElementById('btn-next').disabled = answers[idx] === null;
  document.getElementById('btn-next').textContent = idx === total - 1 ? '結果を見る' : '次へ';
}

function selectOption(choice) {
  answers[currentQ] = choice;
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.classList.toggle('selected', i === (choice === 'a' ? 0 : 1));
  });
  document.getElementById('btn-next').disabled = false;
}

function nextQuestion() {
  if (currentQ < QUESTIONS.length - 1) {
    showQuestion(currentQ + 1);
  } else {
    showResult();
  }
}

function prevQuestion() {
  if (currentQ > 0) showQuestion(currentQ - 1);
}

function calcType() {
  const scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
  QUESTIONS.forEach((q, i) => {
    const ans = answers[i];
    if (!ans) return;
    const winner = ans === 'a' ? q.scoreA : (q.scoreA === 'E' ? 'I' : q.scoreA === 'S' ? 'N' : q.scoreA === 'T' ? 'F' : 'P');
    scores[winner]++;
  });
  return {
    type: (scores.E >= scores.I ? 'E' : 'I') + (scores.S >= scores.N ? 'S' : 'N') + (scores.T >= scores.F ? 'T' : 'F') + (scores.J >= scores.P ? 'J' : 'P'),
    scores
  };
}

function showResult() {
  document.getElementById('page-quiz').style.display = 'none';
  document.getElementById('page-result').style.display = 'block';

  const { type, scores } = calcType();
  const info = TYPES[type];

  document.getElementById('res-emoji').textContent = info.emoji;
  document.getElementById('res-code').textContent = type;
  document.getElementById('res-name').textContent = info.name;
  document.getElementById('res-desc').textContent = info.desc;

  const traitsEl = document.getElementById('res-traits');
  traitsEl.innerHTML = info.traits.map(t => `<span class="trait">${t}</span>`).join('');

  document.getElementById('res-strengths').innerHTML = info.strengths.map(s => `<li>${s}</li>`).join('');
  document.getElementById('res-weaknesses').innerHTML = info.weaknesses.map(s => `<li>${s}</li>`).join('');
  document.getElementById('res-suited').innerHTML = info.suited.map(s => `<li>${s}</li>`).join('');
  document.getElementById('res-unsuited').innerHTML = info.unsuited.map(s => `<li>${s}</li>`).join('');
  document.getElementById('res-stress').innerHTML = info.stress.map(s => `<span class="stress-tag">${s}</span>`).join('');
  document.getElementById('res-relationship').textContent = info.relationship;

  const famousEl = document.getElementById('res-famous');
  famousEl.innerHTML = info.famous.map(f => `<span class="famous-person">${f}</span>`).join('');

  const dims = [
    { left: 'E 外向性', right: 'I 内向性', lKey: 'E', rKey: 'I', total: 5 },
    { left: 'S 感覚', right: 'N 直感', lKey: 'S', rKey: 'N', total: 5 },
    { left: 'T 思考', right: 'F 感情', lKey: 'T', rKey: 'F', total: 5 },
    { left: 'J 判断', right: 'P 知覚', lKey: 'J', rKey: 'P', total: 5 },
  ];
  const barsEl = document.getElementById('res-bars');
  barsEl.innerHTML = dims.map(d => {
    const lScore = scores[d.lKey];
    const rScore = scores[d.rKey];
    const pct = Math.round((lScore / (lScore + rScore)) * 100);
    return `
      <div class="dim-row">
        <div class="dim-labels">
          <span class="left">${d.left} ${lScore}/${d.total}</span>
          <span class="right">${rScore}/${d.total} ${d.right}</span>
        </div>
        <div class="dim-bar-bg"><div class="dim-bar-fill" style="width:${pct}%"></div></div>
      </div>`;
  }).join('');
}

function restartQuiz() {
  answers = new Array(QUESTIONS.length).fill(null);
  document.getElementById('page-result').style.display = 'none';
  document.getElementById('page-start').style.display = 'block';
}
